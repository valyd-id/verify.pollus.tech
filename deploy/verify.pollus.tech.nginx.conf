# /etc/nginx/sites-available/verify.pollus.tech
# Hosted verification SPA (frontend/dist) + Laravel API (php8.4-fpm) on ONE origin.
#   - /api/*  and /up      -> Laravel (php-fpm)   [Hosted + Standalone API]
#   - everything else      -> the React SPA (/verify lives here)
# The SPA calls /api/* same-origin, so no CORS is needed.
#
# HTTP-only on purpose: `certbot --nginx` injects the 443 block + redirect.
#
# Order of operations:
#   1) DNS A record:  verify.pollus.tech -> 96.250.208.62   (REQUIRED FIRST)
#   2) cd /var/www/pollus_main_servers/verify.pollus.tech/frontend && npm ci && npm run build
#   3) sudo cp deploy/verify.pollus.tech.nginx.conf /etc/nginx/sites-available/verify.pollus.tech
#      sudo ln -s /etc/nginx/sites-available/verify.pollus.tech /etc/nginx/sites-enabled/
#      sudo nginx -t && sudo systemctl reload nginx
#   4) sudo certbot --nginx -d verify.pollus.tech
# Also set backend .env: VERIFY_HOSTED_BASE_URL=https://verify.pollus.tech  (then php artisan config:cache)

server {
    listen 80;
    listen [::]:80;
    server_name verify.pollus.tech;

    # Built SPA assets
    root /var/www/pollus_main_servers/verify.pollus.tech/frontend/dist;
    index index.html;

    client_max_body_size 25M;
    client_body_timeout 600s;

    location ^~ /.well-known/acme-challenge/ { allow all; }

    # ---- Laravel API + health (php-fpm) ----
    location ^~ /api/ {
        root /var/www/pollus_main_servers/verify.pollus.tech/backend/public;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_read_timeout 600s;
        fastcgi_send_timeout 600s;
        client_max_body_size 25M;
    }
    location = /up {
        root /var/www/pollus_main_servers/verify.pollus.tech/backend/public;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
    }

    # ---- SPA assets + client-side routes (/verify etc.) ----
    location ~* \.(js|css|woff2?|ttf|otf|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location / {
        try_files $uri /index.html;
    }

    access_log /var/log/nginx/verify_pollus_access.log;
    error_log  /var/log/nginx/verify_pollus_error.log;
}
