# /etc/nginx/sites-available/demos.pollus.tech
# Public demo site. It is a TanStack Start (React) SSR app that runs as a Node
# process (see demos.pollus.tech/server.node.mjs, managed by pm2 on 127.0.0.1:3100)
# and proxies to the Valyd Verify API via server functions. nginx reverse-proxies
# to that Node server. NOTE: this is NOT a Laravel/php-fpm site.
#
# HTTP-only on purpose: `certbot --nginx` injects the 443 block + redirect.
#
# Order of operations:
#   1) DNS A record:  demos.pollus.tech -> 96.250.208.62   (REQUIRED FIRST)
#   2) cd /var/www/pollus_main_servers/demos.pollus.tech
#      NITRO_PRESET=node-server ./node_modules/.bin/vite build   # build dist/
#      pm2 start ecosystem.config.cjs --only demos    # start the SSR node server
#   3) sudo cp deploy/demos.pollus.tech.nginx.conf /etc/nginx/sites-available/demos.pollus.tech
#      sudo ln -s /etc/nginx/sites-available/demos.pollus.tech /etc/nginx/sites-enabled/
#      sudo nginx -t && sudo systemctl reload nginx
#   4) sudo certbot --nginx -d demos.pollus.tech

upstream demos_ssr {
    server 127.0.0.1:3100;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name demos.pollus.tech;

    client_max_body_size 25M;
    client_body_timeout 600s;

    location ^~ /.well-known/acme-challenge/ { allow all; }

    # Serve hashed, immutable client assets directly from the build for speed.
    location /assets/ {
        alias /var/www/pollus_main_servers/demos.pollus.tech/dist/client/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri @ssr;
    }

    # Everything else (SSR pages + server functions) -> the Node server.
    location / {
        proxy_pass http://demos_ssr;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location @ssr {
        proxy_pass http://demos_ssr;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/demos_pollus_access.log;
    error_log  /var/log/nginx/demos_pollus_error.log;
}
